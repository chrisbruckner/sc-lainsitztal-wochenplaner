<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC Lainsitztal – Wochenplaner</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 20px;
      min-height: 100vh;
    }

    /* ---- Controls ---- */
    .controls {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px 20px;
      width: 1080px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid #333;
    }
    .controls label { color: #aaa; font-size: 13px; }
    .controls input[type=text], .controls input[type=time], .controls select {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      font-weight: 600;
    }
    .btn-add { background: #2a7a3a; color: #fff; }
    .btn-export { background: #fff; color: #111; }
    .btn-prev, .btn-next { background: #333; color: #fff; font-size: 16px; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .week-info { color: #fff; font-size: 15px; font-weight: 600; min-width: 180px; text-align: center; }

    /* ---- Poster ---- */
    #poster {
      width: 1080px;
      background: #0f2a16;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    /* diagonal pattern */
    #poster::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.018) 40px,
        rgba(255,255,255,0.018) 80px
      );
      pointer-events: none;
    }

    /* ---- Header ---- */
    .poster-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px 20px;
      border-bottom: 2px solid rgba(255,255,255,0.12);
      position: relative;
      z-index: 1;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .logo-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      object-fit: cover;
    }
    .brand-text .club {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
    }
    .brand-text .sub {
      font-size: 13px;
      color: #5cde7a;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-week {
      text-align: right;
    }
    .kw-badge {
      background: #2a7a3a;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 3px;
      padding: 4px 20px 0;
      border-radius: 10px;
      line-height: 1;
    }
    .week-dates {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ---- Grid ---- */
    .grid-wrap {
      padding: 20px 24px 24px;
      position: relative;
      z-index: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      gap: 3px;
    }

    .col-head {
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 7px 4px;
      text-align: center;
    }
    .col-head .dn { color: #fff; font-size: 12px; font-weight: 600; }
    .col-head .dd { color: rgba(255,255,255,0.4); font-size: 10px; margin-top: 2px; }
    .col-head.today { background: rgba(42,122,58,0.5); }
    .col-head.today .dn { color: #5cde7a; }

    .row-lbl {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #5cde7a;
      letter-spacing: 0.5px;
      padding: 4px 2px;
      border-radius: 6px;
      background: rgba(92,222,122,0.08);
      min-height: 52px;
    }

    .cell {
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      min-height: 52px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .cell.today { background: rgba(42,122,58,0.12); }

    .game {
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 10px;
      line-height: 1.3;
      cursor: pointer;
      position: relative;
      word-break: break-word;
      word-wrap: break-word;
    }
    .game.home {
      background: rgba(92,222,122,0.18);
      border-left: 3px solid #5cde7a;
      color: #c8f5d5;
    }
    .game.away {
      background: rgba(255,200,50,0.15);
      border-left: 3px solid #ffd44a;
      color: #fff3c0;
    }
    .game .gt { font-size: 9px; opacity: 0.8; color: inherit; }
    .game .go { font-weight: 700; font-size: 10px; color: inherit; }
    .game .gl { font-size: 9px; opacity: 0.7; color: inherit; }
    .game .del {
      position: absolute;
      top: 2px; right: 4px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 11px;
      display: none;
    }
    .game:hover .del { display: block; }

    /* ---- Footer ---- */
    .poster-footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .legend {
      display: flex;
      gap: 20px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }
    .leg-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }
    .game-total {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
    .game-total span { color: #5cde7a; font-weight: 700; }

    /* ---- Feedback ---- */
    .feedback {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #2a7a3a;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
      z-index: 1000;
    }
    .feedback.show { display: block; }
    .feedback.error { background: #8a3a3a; }

    /* ---- Modal ---- */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .modal h3 {
      margin: 0 0 20px 0;
      font-size: 18px;
      font-weight: 600;
    }
    .modal-btns {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-btns.cancel, .modal-btns.save {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    .modal-btns.cancel {
      background: #333;
      color: #fff;
    }
    .modal-btns.save {
      background: #2a7a3a;
      color: #fff;
    }
    .modal-btns.cancel:hover { background: #444; }
    .modal-btns.save:hover { background: #3a9a4a; }
  </style>
</head>
<body>

<!-- Feedback message -->
<div class="feedback" id="feedback"></div>

<!-- Add Game Modal -->
<div class="modal-bg" id="addGameModal">
  <div class="modal" style="width: 400px;">
    <h3>➕ Spiel hinzufügen</h3>
    
    <div style="display: flex; flex-direction: column; gap: 12px;">
      <div>
        <label style="color: #aaa; font-size: 12px;">Mannschaft</label>
        <select id="formTeam" style="background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 100%; font-size: 13px;">
          <option>U7</option>
          <option>U8</option>
          <option>U10</option>
          <option>U11</option>
          <option>U12</option>
          <option>U13</option>
          <option>U14</option>
          <option>U15</option>
        </select>
      </div>

      <div>
        <label style="color: #aaa; font-size: 12px;">Datum</label>
        <input type="date" id="formDate" style="background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 100%; font-size: 13px;">
      </div>

      <div>
        <label style="color: #aaa; font-size: 12px;">Uhrzeit</label>
        <input type="time" id="formTime" style="background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 100%; font-size: 13px;">
      </div>

      <div>
        <label style="color: #aaa; font-size: 12px;">Gegner</label>
        <input type="text" id="formOpponent" placeholder="z.B. FC Waldviertel" style="background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 100%; font-size: 13px;">
      </div>

      <div>
        <label style="color: #aaa; font-size: 12px;">Ort</label>
        <input type="text" id="formLocation" placeholder="z.B. Sporthalle St. Martin" style="background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 100%; font-size: 13px;">
      </div>
    </div>

    <div class="modal-btns" style="margin-top: 20px;">
      <button class="modal-btns cancel" onclick="toggleAddForm()">Abbrechen</button>
      <button class="modal-btns save" onclick="addGame()">Spiel hinzufügen</button>
    </div>
  </div>
</div>

<!-- Feedback message -->
<div class="feedback" id="feedback"></div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-prev" onclick="changeWeek(-1)">←</button>
  <span class="week-info" id="weekInfo">Laden...</span>
  <button class="btn btn-next" onclick="changeWeek(1)">→</button>
  <button class="btn btn-add" onclick="toggleAddForm()" style="background: #3a5a8a; flex-shrink: 0;">➕ Spiel hinzufügen</button>
  <button class="btn btn-add" onclick="syncWebcalGames()" style="background: #2a5a7a; flex-shrink: 0;" id="syncBtn">🔄 Spiele aktualisieren</button>
  <button class="btn btn-export" onclick="exportPoster()">⬇ Als Bild speichern</button>
</div>

<!-- POSTER -->
<div id="poster">
  <div class="poster-header">
    <div class="header-brand">
      <img class="logo-img" src="assets/sc_stmartin.png" alt="SC Lainsitztal Logo">
      <div class="brand-text">
        <div class="club">SC Lainsitztal St. Martin</div>
        <div class="sub">Nachwuchs · Spielplan</div>
      </div>
    </div>
    <div class="header-week">
      <div class="kw-badge" id="kwBadge">KW XX</div>
      <div class="week-dates" id="weekDatesBig">Loading...</div>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="mainGrid"></div>
  </div>

  <div class="poster-footer">
    <div class="legend">
      <div class="leg-item">
        <div class="leg-dot" style="background:#5cde7a;"></div>Heimspiel
      </div>
      <div class="leg-item">
        <div class="leg-dot" style="background:#ffd44a;"></div>Auswärtsspiel
      </div>
    </div>
    <div class="game-total" id="gameTotal">Gesamt: <span>0</span> Spiele</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
